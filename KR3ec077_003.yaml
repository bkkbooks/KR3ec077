body:
  text: 卷下香豉主治心中懊憹也旁治心中結痛及心中滿而煩也考證枳實梔子豉湯證不具也說在互考中梔子大黃豉湯證曰心中懊憹以上二方香豉皆一升梔子豉湯證曰心中懊憹又曰胸中窒又曰心中結痛梔子甘草豉湯證不具也說在互考中梔子生薑豉湯證不具也說在互考中以上三方香豉皆四合瓜蒂散證曰心中滿而煩以上一方香豉一合上歷觀此諸方其主治心中懊憹也明矣互考枳實梔子豉湯條無心中懊憹證為則按梔子大黃豉湯此枳實梔子豉湯而加大黃者而其條有心中懊憹之證心中懊憹固非大黃所主治也然則枳實梔子豉湯條其脫心中懊憹之證也明矣梔子甘草豉湯梔子生薑豉湯是梔子豉湯加味之方也故每章之首冠以若字焉心中懊憹而少氣者梔子甘草豉湯心中懊憹而嘔者梔子生薑豉湯斯可以知已辨誤梔子豉湯方後皆有一服得吐止後服七字世醫遂誤以為吐劑不稽之甚為則試之特治心中懊憹耳未嘗必吐也且心中懊憹而嘔者本方加用生薑其非為吐劑也亦可以見矣傷寒論集註曰舊本有一服得吐止後服七字此因瓜蒂散中有香豉而誤傳於此也今為刪正余亦從之品考香豉李時珍曰造淡豉法用黑大豆二三斗六月中淘淨水浸一宿瀝乾蒸熟取出攤席上候微溫蒿覆每三日一看候黃衣上遍不可大過取曬簸淨以水拌之乾溼得所以汁出指間為準安罐中築實桑葉蓋厚三寸密封泥於日中曬七日取出曝一時又以水拌入罐如此七次再蒸過攤去火氣罐收築封即成矣澤瀉主治小便不利冒眩也旁治渴考證澤瀉湯證曰心下有支飲其人苦冒眩五苓散證曰小便不利微熱消渴以上二方以澤瀉為君藥澤瀉湯澤瀉五兩五苓散一兩六銖半茯苓澤瀉湯證曰吐而渴欲飲水以上一方澤瀉四兩八味丸證曰小便不利又曰消渴小便反多以上一方澤瀉三兩豬苓湯證曰渴欲飲水小便不利以上一方澤瀉一兩牡蠣澤瀉散證曰從腰以下有水氣以上一方用澤瀉與余藥等分茯苓澤瀉湯以下四方以澤瀉為佐藥也上歷觀此諸方澤瀉所主治也不辨而明矣互考澤瀉五味子同治冒而有其別也說見於五味子部中辨誤陶弘景曰澤瀉久服則無子陳日華曰澤瀉催生令人有子李時珍辨之其論詳於本草綱目夫懷孕婦人之常也而有病不孕故其無病而孕者豈其藥之所能得失乎三子不知此義可謂謬矣余嘗治一婦人年三十有餘病而無子有年於茲諸醫無如之何余為診之胸膈煩躁上逆而渴甚則如狂乃與石膏黃連甘草湯並以滾痰丸服之周歲諸證盡愈其父大喜以語前醫前醫曰治病則可而不仁也曰何謂也曰多服石膏無子也是絕婦道也非不仁而何其父愕然招余詰之余答曰醫者掌疾病者也而孕也者人為而天賦醫焉知其有無哉且彼人之言子何不察焉彼人療之十有三年而不能治之彼豈豫知其來者乎其父曰然居頃之其婦人始孕也彌月而娩毋子無恙余故曰婦人無病則孕非藥之所能得失也品考澤瀉本邦仙台所出者是為良也銼用薏苡仁主治乳腫也考證薏苡附子散證不具也以上一方薏苡仁十五兩薏苡附子敗醬散證曰腹皮急按之濡如腫狀以上一方薏苡仁十分麻黃杏仁薏苡甘草湯證不具也以上一方薏苡仁半兩互考薏苡附子散證不具也而薏苡附子敗醬散言如腫狀則主治浮腫明矣麻黃杏仁薏苡甘草湯亦就麻黃杏仁甘草石膏湯而去石膏加薏苡則用之於咳喘浮腫可也品考薏苡仁和漢無別田野水邊處處多有焉本交趾之種馬援載還也本邦有二其殼厚無芽以為念經數珠不中用藥也有芽尖而殼薄即意苡也俗傳其種弘法師之所將來也因號弘法麥薤白主治心胸痛而喘息咳唾也旁治背痛心中痞考證栝蔞薤白白酒湯證曰喘息咳唾胸背痛枳實薤白桂枝湯證曰胸痹心中痞以上二方薤白皆半升栝蔞薤白半夏湯證曰心痛徹背以上一方薤白三兩上歷觀此三方薤白所主治也不辨而明矣品考薤白有赤白二種白者為良李時珍曰薤葉狀似韭韭葉中實而扁有劍脊薤葉中空似細蔥葉而有稜氣亦如蔥二月開細花紫白色根如小蒜一本數顆相依而生五月葉青則掘之否則肉不滿也乾薑主治結滯水毒也旁治嘔吐嗽下利厥冷煩躁腹痛胸痛腰痛考證大建中湯證曰心胸中大寒痛嘔不能飲食苓薑朮甘湯證曰身體重腰中冷又云腰以下冷痛半夏乾薑散證曰乾嘔吐逆吐涎沫以上三方乾薑或四兩或諸藥等分人參湯證曰喜唾又曰心中痞通脈四逆湯證曰下利清穀又曰手足厥逆又云乾嘔小青龍湯證曰心下有水氣乾嘔又云咳半夏瀉心湯證曰嘔而腸鳴柴胡薑桂湯證曰胸脅滿又云心煩黃連湯證曰腹中痛欲嘔吐苓甘五味姜辛湯證曰咳胸滿乾薑黃連黃芩人參湯證曰吐下六物黃芩湯證曰乾嘔下利以上九方乾薑皆三兩梔子乾薑湯證曰微煩甘草乾薑湯證曰厥咽中干煩躁吐逆乾薑附子湯證曰煩躁不得眠以上三方乾薑二兩一兩而四兩之例四逆湯證曰下利清穀又曰手足厥冷以上一方乾薑一兩半而三兩之例桃花湯證曰下利乾薑人參半夏丸證曰嘔吐不止以上二方乾薑一兩而三兩之例上歷觀此諸方其嘔吐者咳者痛者下利者之等壹是皆水毒之結滯者也互考孫思邈曰無生薑則以乾薑代之以余觀之仲景氏用生薑乾薑其所主治大同而小異生薑主嘔吐乾薑主水毒之結滯者也不可混矣辨誤本草以乾薑為大熱於是世醫皆謂四逆湯方中薑附熱藥也故能溫厥冷非也按厥冷者毒之急迫也故甘草以為君而薑附以為佐其用薑附者以逐水毒也何熱之有京師二條路白山街有嘉兵衛者號近江鋪其男年始十有三一朝而下利及至日午無知其行數於是神氣困冒醫為獨參湯與之及至日晡所手足厥冷醫大懼用薑附益多而厥冷益甚諸醫皆以為不治余為診之百體無溫手足擗地煩躁而叫號如有腹痛之狀當臍有動手不可近余乃謂曰是毒也藥可以治焉知其死生則我不知之也雖然今治亦死不治亦死等死死治可乎親戚許諾乃與大承氣湯一帖之重十二錢一服不知復與厥冷則變為熱三服而神色反正下利減半服十日所諸證盡退由是觀之醫之於事知此藥解此毒耳毒之解也厥冷者溫大熱者涼若以厥冷復常為熱藥則大黃芒硝亦為熱藥乎藥物之寒熱溫涼不可論斯可以知已品考乾薑本邦之產有二品曰乾生薑曰三河干姜所謂乾生薑者余家用之所謂三河干姜者余家不用之杏仁主治胸間停水也故治喘咳而旁治短氣結胸心痛形體浮腫考證麻黃湯證曰無汗而喘以上一方杏仁七十個苓甘姜味辛夏仁湯證曰形腫者加杏仁以上一方杏仁半斤茯苓杏仁甘草湯證曰胸中氣塞短氣麻黃杏仁甘草石膏湯證曰喘桂枝加厚朴杏子湯證曰喘以上三方杏仁皆五十個大青龍湯證曰咳喘麻黃杏仁薏苡甘草湯證不具也說在類聚方以上二方杏仁四十個二兩而五十個之例大陷胸丸證曰結胸者項亦強走馬湯證曰心痛以上二方杏仁諸藥等分上歷觀此諸方杏仁主治胸間停水也明矣互考杏仁麻黃同治喘而有其別胸滿不用麻黃身疼不用杏仁其二物等用者以有胸滿身疼二證也金匱要略曰胸痹云云茯苓杏仁甘草湯主之橘枳薑湯亦主之為則按胸痹短氣筋惕肉瞤心下悸者茯苓杏仁甘草湯主之胸痹嘔吐呃逆者橘皮枳實生薑湯主之二方治一證非古之道也栝蔞實條既辨明之今不贅於茲也品考杏仁和漢無異品也制之之法去皮不去尖大棗主治攣引強急也旁治咳嗽奔豚煩躁身疼脅痛腹中痛考證十棗湯證曰引脅下痛又曰咳煩胸中痛葶藶大棗湯證曰咳逆上氣喘鳴迫塞又曰不得息以上二方以大棗為君藥一則十枚一則十二枚苓桂甘棗湯證曰欲作奔豚越婢湯證不具也說在類聚方生薑甘草湯證不具也說在互考中以上三方大棗皆十五枚甘麥大棗湯證曰臟躁喜悲傷以上一方大棗十枚小柴胡湯證曰頸項強又云脅痛小建中湯證曰急痛大青龍湯證曰身疼痛汗不出而煩躁黃連湯證曰腹中痛葛根湯證曰項背強黃芩湯證不具也說在類聚方桂枝加黃耆湯證曰身疼重煩躁吳茱萸湯證曰煩躁以上八方大棗皆十二枚上歷試此諸方皆其所舉諸證而有攣引強急之狀者用大棗則治矣不則無效也且也十棗湯大棗為君藥而有引痛證斯可以為徵已互考甘麥大棗湯條有喜悲傷證此毒之逼迫也故用大棗以治攣引強急用甘草小麥以緩迫急也苓桂甘棗湯條有奔豚證此其毒動而上衝有攣引強急之狀者故用大棗也生薑甘草湯證曰咳唾涎沫不止為則按若之人患胸中有攣引強急之狀故用大棗居多也為則按仲景氏用大棗甘草芍藥其證候大同而小異要在自得焉耳辨誤大棗養脾胃之說非古也不取焉古人云攻病以毒藥養精以穀肉果菜夫攻之與養所主不同一物而二義如曾晰之於羊棗好而食之是養也如十棗湯用大棗惡而不避是攻也無他嗜好之品而充食用則為養也而充藥物則為攻也十棗湯大棗為君而治攣引強急豈以為養哉品考大棗漢種者為良其品核小而肉厚也不去核而銼用之橘皮主治呃逆也旁治胸痹停痰考證橘皮竹茹湯證曰噦逆噦者呃之謂也以上一方橘皮二斤橘皮枳實生薑湯證曰胸痹說在杏仁部中以上一方橘皮一斤橘皮湯證曰噦以上一方橘皮四兩茯苓飲證曰心胸中有停痰以上一方橘皮二兩半上歷觀此諸方主治呃逆也明胸痹者停痰者其有呃逆之證則橘皮所能治也品考橘皮近世間以柑子代橘皮非也可選用焉真橘樹者余觀之於和州春日祠前於遠州見附驛也吳茱萸主治嘔而胸滿也考證吳茱萸湯證曰嘔而胸滿以上一方吳茱萸一斤品考吳茱萸無贗物瓜蒂主治胸中有毒欲吐而不吐也考證瓜蒂散證曰胸中痞硬氣上衝咽喉不得息者又曰心中滿而煩飢而不能食者病在胸中以上一方瓜蒂一分品考瓜蒂宗奭時珍以為甜瓜蒂試之無寸效也又有一種名柿瓜其種殊少而其形如柿又有一種如柿瓜而皮上有毛者其始皆太苦而不可食也及熟則尤甜美其蒂甚苦有效可用三才圖會所謂青瓜也本邦越前之產是為良也桂枝主治沖逆也旁治奔豚頭痛發熱惡風汗出身痛考證桂枝加桂湯證曰氣自少腹上衝心以上一方桂枝五兩桂枝甘草湯證曰其人叉手自冒心心下悸欲得按桂枝甘草附子湯證不具也說在互考中苓桂甘棗湯證曰欲作奔豚苓桂五味甘草湯證曰氣從少腹上衝胸咽桂枝附子湯證不具也說在互考中以上五方桂枝皆四兩桂枝湯證曰上衝又曰頭痛發熱汗出惡風苓桂朮甘湯證曰氣上衝胸以上二方桂枝皆三兩上歷觀此諸方桂枝主治沖逆也明矣頭痛發熱之輩其所旁治也仲景之治疾用桂枝者居十之七八今不枚舉焉互考桂枝甘草湯證曰其人叉手自冒心為則按叉手冒心者以悸而上衝故也桂枝甘草附子湯條無上衝證為則按此方桂枝甘草湯而加附子者也桂枝甘草湯條有上衝證然則此湯亦當有上衝證其脫此證也明矣桂枝附子湯用桂枝多於桂枝加附子湯而無上衝證蓋闕文也桂枝加附子湯條猶有桂枝之證況於此湯而可無桂枝之證乎辨誤範大成桂海志云凡木葉心皆一縱理獨桂有兩道如圭形故字從之陸佃埤雅云桂猶圭也宣導百藥為之先聘通使如執圭之使也為則按制字之說範為得之蓋以其所見而言之也陸則失矣蓋以臆測之而強作之說也不可從矣傷寒論曰桂枝本為解肌非仲景氏之意也不取此蓋注誤入本文者也宗奭曰漢張仲景以桂枝湯治傷寒表虛是不善讀傷寒論之過也傷寒論中間說表裡虛實非疾醫之言也蓋後人所攙入也凡仲景之用桂枝以治上衝也桂枝湯條曰上衝者可與桂枝湯若不上衝者不可與之桂枝加桂湯條曰氣從少腹上衝心又按去桂加朮湯條曰小便自利由是觀之上衝則用桂下降則否斯可以見已且虛實之說仲景所言不失古訓而後人所攙入則不合古訓宗奭不善讀書而妄為之說過矣品考桂枝氣味辛辣者為上品也李杲以氣味厚薄分桂枝肉桂遂構上行下行之說是臆測也不可從矣桂枝也肉桂也桂心也一物而三名也桂心之說陳藏器李時珍得之厚朴主治胸腹脹滿也旁治腹痛考證大承氣湯證曰腹脹滿又曰腹中滿痛厚朴三物湯證曰痛而閉厚朴七物湯證曰腹滿厚朴生薑甘草半夏人參湯證曰腹脹滿以上四方厚朴皆半斤枳實薤白桂枝湯證曰胸滿梔子厚朴湯證曰腹滿以上二方厚朴皆四兩半夏厚朴湯證曰咽中如有炙臠以上一方厚朴三兩小承氣湯證曰腹大滿不通以上一方厚朴二兩上歷觀此諸方厚朴主治脹滿也明矣互考厚朴三物湯條無腹滿證此湯即大承氣湯而無芒硝者也然則有腹滿證也可知己其無芒硝者以無堅塊也辨誤張元素曰厚朴雖除腹脹若虛弱人宜斟酌用之誤則脫人之元氣也為則曰是無稽之言也古語曰攻病以毒藥方疾之漸也元氣為其所抑遏醫以毒藥攻之毒盡而氣旺何怖之有請舉其徵大承氣湯厚朴為君而有此湯之證者多有不能食神氣不旺者於是施以此湯則毒除也毒除能食能食氣旺往往而然也厚朴脫人之元氣徒虛語耳品考厚朴漢產為良本邦所產非真厚朴也不堪用矣或云本邦之產有二種其一則冬月葉不落是與漢土所產同比睿山有之枳實主治結實之毒也旁治胸滿胸痹腹滿腹痛考證枳實湯證曰心下堅大如盤以上一方枳實七枚枳實芍藥散證曰腹痛煩滿以上一方枳實諸藥等分桂枝枳實生薑湯證曰心懸痛大承氣湯證曰腹脹滿厚朴三物湯證曰痛而閉厚朴七物湯證曰腹滿梔子大黃豉湯證曰熱痛以上五方枳實皆五枚大柴胡湯證曰心下急鬱郁微煩枳實薤白桂枝湯證曰胸滿梔子厚朴湯證曰心煩腹滿以上三方枳實皆四枚小承氣湯證曰腹大滿不通枳實梔子豉湯證不具也說在互考中橘皮枳實生薑湯證曰胸痹以上三方枳實皆三枚上歷觀此諸方枳實主治結實之毒也明矣互考仲景氏用承氣湯也大實大滿結毒在腹則大承氣湯其用枳實也五枚唯腹滿不通則小承氣湯其用枳實也三枚枳實主治結實斯可以見已枳實梔子豉湯其證不具也為則按梔子香豉主治心中懊憹而更加枳實則其有胸滿之證明矣品考枳實本邦所產稱枳實者不堪用也漢土之產亦多贗也不可不擇焉本草綱目諸家岐枳實枳殼而為之說非古也吾則從仲景氏也梔子主治心煩也旁治發黃考證大黃硝石湯證曰黃疸梔子柏皮湯證曰身黃以上二方梔子皆十五枚梔子豉湯證曰煩梔子甘草豉湯證不具也說在香豉部中梔子生薑豉湯證不具也說在香豉部中枳實梔子豉湯證不具也說在枳實部中梔子厚朴湯證曰心煩梔子乾薑湯證曰微煩茵陳蒿湯證曰心胸不安久久發黃以上七方梔子皆十四枚梔子大黃豉湯證曰黃疸以上一方梔子十二枚上歷觀此諸方梔子主治心煩也明矣發黃者其所旁治也故無心煩之證者而用之則未見其效矣互考梔子大黃豉湯梔子十二枚為則按當作十四枚是梔子劑之通例也為則按香豉以心中懊憹為主梔子則主心煩也辨誤本草諸說動輒以五色配五臟其說曰梔子色赤味苦入心而治煩又曰梔子治發黃黃是土色胃主土故治胃中熱氣學者取其然者而莫眩其所以然者斯為可矣品考梔子處處出焉銼用酸棗仁主治胸膈煩躁不能眠也考證酸棗仁湯證曰虛煩不得眠為則按虛煩當作煩躁以上一方酸棗仁二升辨誤時珍曰熟用不得眠生用好眠誤矣眠與不眠非生熟之所為也乃胸膈煩躁或眠或不眠者服酸棗仁則皆復常矣然則酸棗仁之所主非主眠與不眠也而歷代諸醫以此立論誤也以不知人道也夫人道者人之所能為也非人之所能為者非人道也學聖人之道然後始知之蓋眠者寤者造化之主也而非人之為也而煩躁者毒之為而人之造也酸棗能治之故胸膈煩躁或寤而少寐或寐而少寤予不問酸棗之生熟用而治之則煩躁罷而寤寐復故嗚呼悲哉聖人之世遠人亡歷代之學者其解聖經往往以天事混之於人事故其論可聞而行不可知也人而不人醫而不醫吾黨小子慎之勿混造化與人事矣品考酸棗仁和漢共有焉漢產為良也茯苓主治悸及肉瞤筋惕也旁治小便不利頭眩煩躁考證苓桂甘棗湯證曰臍下悸茯苓戎鹽湯證不具也說在互考中茯苓澤瀉湯證不具也說在互考中以上三方茯苓皆半斤防己茯苓湯證曰四肢聶聶動茯苓四逆湯證曰煩躁以上二方茯苓皆六兩茯苓杏仁甘草湯證不具也說在互考中以上一方茯苓三兩而亦六兩之例苓桂朮甘湯證曰身為振振搖又云頭眩苓桂五味甘草湯證曰小便難苓薑朮甘湯證不具也說在互考中木防己去石膏加茯苓芒硝湯證不具也說同上小半夏加茯苓湯證曰眩悸半夏厚朴湯證不具也說在互考中以上六方茯苓皆四兩此外苓桂劑頗多今不枚舉焉茯苓甘草湯證曰心下悸以上一方茯苓二兩而亦四兩之例茯苓飲證不具也說在互考中栝蔞瞿麻丸證曰小便不利葵子茯苓散證曰頭眩真武湯證曰心下悸頭眩身瞤動附子湯證不具也說在互考中桂枝去桂加茯術湯證曰小便不利以上方六茯苓皆三兩五苓散證曰臍下有悸吐涎沫而癲眩以上一方茯苓十八銖豬苓湯證曰小便不利心煩桂枝茯苓丸證曰胎動說在互考中以上二方茯苓諸藥等分上歷觀此諸方曰心下悸曰臍下悸曰四肢聶聶動曰身瞤動曰頭眩曰煩躁一是皆悸之類也小便不利而悸者用茯苓則治其無悸證者而用之則未見其效然則悸者茯苓所主治而小便不利者則其旁治也頭眩煩躁亦然互考茯苓戎鹽湯茯苓澤瀉湯各用茯苓半斤以為主藥而不舉茯苓之證苓桂甘棗湯亦用茯苓半斤而有臍下悸之證其他用茯苓為主藥者各有悸眩瞤動之證況於二方多用茯苓而可無若證乎其證脫也必矣茯苓杏仁甘草湯方是苓桂朮甘湯去桂術加杏仁者也然則其脫茯苓之證也明矣茯薑朮甘湯有身為振振搖證此非桂之主證而苓之所能治也然則苓薑朮甘湯條脫此證也明矣木防己去石膏加茯苓芒硝湯方是防己茯苓湯以黃耆甘草代人參芒硝者而防己茯苓湯有四肢聶聶動之證是非黃耆甘草之主證而茯苓之所主治也由是觀之此湯脫四肢瞤動之證也明矣半夏厚朴湯是小半夏加茯苓湯更加厚朴蘇葉者也然則其脫眩悸之證也明矣茯苓甘草湯方是苓桂朮甘湯去朮加姜者也可以前例而推之茯苓飲以苓為主而不舉其證以他例推之心悸下而痞硬小便不利自吐宿水者此湯所主治也附子湯方是真武湯去姜加參者也真武湯條有心下悸頭眩身瞤動之證然則此湯之條脫若證也明矣桂枝茯苓丸證曰胎動在臍上為則按蓋所謂奔豚也而不可臆測焉以旁例推之上衝心下悸經水有變或胎動者此丸所主也人參茯苓黃連其功大同而小異說在人參部中品考茯苓和漢無異也陶弘景曰仙方止雲茯苓而無茯神為療既同用之應無嫌斯言得之赤白補瀉之說此臆之所斷也不可從矣豬苓主治渴而小便不利也考證豬苓湯證曰渴欲飲水小便不利豬苓散證曰思水者以上二方豬苓諸藥等分五苓散證曰小便不利微熱消渴以上一方豬苓十八銖上歷觀此三方豬苓所主治渴而小便不利也明矣品考豬苓和漢共有焉漢產實者為良也水蛭主治血證也考證抵當湯證曰少腹硬滿云云又曰經水不利下抵當丸證曰少腹滿應小便不利今反利者為有血也以上二方水蛭或三十個或二十個上觀此二方則水蛭之所主治也明矣為則按診血證也其法有三焉一曰少腹硬滿而小便利者此為有血而不利者為無血也二曰病人不腹滿而言腹滿也三曰病人喜妄屎雖硬大便反易其色必黑此為有血也仲景氏診血證之法不外於茲矣品考水蛭蘇恭曰有水蛭草蛭大者長尺許並能咂牛馬人血今俗多取水中小者用之大效龍骨主治臍下動也旁治煩驚失精考證桂枝去芍藥加蜀漆龍骨牡蠣湯證曰驚狂起臥不安以上一方龍骨四兩桂枝加龍骨牡蠣湯證曰失精少腹弦急天雄散證闕說在術部中蜀漆散證不具也說在互考中以上三方龍骨三兩或諸藥等分柴胡加龍骨牡蠣湯證曰煩驚以上一方龍骨一兩說在外傳中桂枝甘草龍骨牡蠣湯證曰煩躁以上一方龍骨二兩而亦四兩之例上歷觀此諸方龍骨所治驚狂煩躁失精也無容疑者為則每值有其證者輒用之而間有無效者於是乎中心疑之居數歲始得焉其人臍下有動而驚狂或失精或煩躁者用龍骨劑則是影響其無臍下動者而用之則未見其效由是觀之龍骨之所主治者臍下之動也而驚狂失精煩躁其所旁治也學者審諸互考蜀漆散條所謂瘧者是寒熱發作有時也而其有臍下動者此散所主治也無臍下動者而用之則未見其效辨誤龍骨之說或曰斃也或曰石也諸說終無有一定也為則按譬如人物乎父精母血相因為體人人而所知也雖然果然之與不孰究論之龍骨亦然究論何益之有至如其效用則此可論也可擇也不可不知也品考龍骨以能化者為上品也有半骨半石之狀者是未化也取龍骨法如取石膏法也打碎用之牡蠣主治胸腹之動也旁治驚狂煩躁考證桂枝去芍藥加蜀漆龍骨牡蠣湯證曰驚狂起臥不安以上一方牡蠣五兩牡蠣湯證不具也說在互考中以上一方牡蠣四兩牡蠣澤瀉散證不具也說在互考中以上一方牡蠣諸藥等分柴胡薑桂湯證曰微煩以上一方牡蠣三兩桂枝甘草龍骨牡蠣湯證曰煩躁以上一方牡蠣二兩而亦四兩之例柴胡加龍骨牡蠣湯證曰煩驚以上一方牡蠣一兩半說在外傳中上歷觀此諸方牡蠣所治驚狂煩躁似與龍骨無復差別為則從事於此也久之始知牡蠣治胸腹之動矣學者亦審諸互考牡蠣黃連龍骨同治煩躁而各有所主治也膻中黃連所主也臍下龍骨所主也而部位不定胸腹煩躁者牡蠣所主也牡蠣湯條曰瘧牡蠣澤瀉散條曰有水氣其所舉之證蓋不具也以他例推之喘急息迫而胸中有動者牡蠣湯主之也身體水腫腹中有動渴而小便不利者牡蠣澤瀉散主之也學者審諸品考牡蠣殼之陳久者為良也余家今用出於藝州者也坊間所鬻者不堪用也
