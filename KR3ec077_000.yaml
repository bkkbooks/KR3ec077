body:
  text: 跋蓋古書之貴於世以施諸今而有徵也其古雖並於詩書言之與實背馳則不足貴矣本草之書傳於世也雖邈焉鑿説之甚辨折以胸臆引據以神仙其言巧而似於是其理達而遠乎實遊斷諜諜不異趙括之論兵也先考東洞翁於是作藥徵考校效驗訂繩謬誤揣權宜精異同雖頗窮經旨未嘗有如本草説多能者然循其運用之變奏異功則殆如天出而俏性多能是方之功而非一物之能也夫陽燧取火於日方諸取露於月而浮雲蓋其光則水火忽不可致也而終日握陽燧不得溫手終夜舐方諸不能止渴方諸陽燧雖致水火責之以其能而不獲者非自然之能也自然之能出乎天而不假他力法用之功成之可以據載籍雖古豈足尊信哉行考之於藥徵也主治頗詳明不道陰陽不拘五行以顯然之證徵於長沙之法推功之實審事之狀闡衆之所未發以燭乎冥行之徒誠扁鵲之遺範也其書之已成受業者奉之屢請刊行翁喟然歡曰過矣刊行何急世所刊之書後欲廢者往往有之皆卒然之過也藥論者醫之大本究其精良終身之業也今刊未校之書傳乎不朽為人戮笑寧蠹滅於櫝中終不許焉翁卒暨於今十有二年遂命剞劂之師利行之於世矣天明甲辰之冬十一月朔男猷謹題
