body:
  text: 卷中黃連主治心中煩悸也旁治心下痞吐下腹中痛考證黃連阿膠湯證曰心中煩不得臥以上一方黃連四兩黃連湯證曰胸中有熱腹中痛欲嘔吐乾薑黃連黃芩人參湯證曰吐下葛根黃連黃芩湯證曰利遂不吐白頭翁湯證曰下利欲飲水以上四方黃連皆三兩大黃黃連瀉心湯證曰心下痞按之濡瀉心湯證曰心氣不足附子瀉心湯證曰心下痞以上三方黃連皆一兩而亦三兩之例上歷觀此諸方黃連治心中煩悸也明矣故心中煩悸而痞者吐者利者腹痛者用此皆治也此外用黃連一兩方多其比余藥分量差少但舉心胸之微疾不足取而徵焉故不枚舉也互考張仲景用黃連其證與人參茯苓大同而小異説在人參部黃連阿膠湯證曰心中煩此方黃連為君而有心中煩之證斯可以見其主治矣瀉心湯證曰心氣不足而吐血衄血者瀉心湯主之既云不足又云瀉心此後世論説之所由起也然千金方不足作不定斯仲景之古也而不定者煩悸之謂也凡病心中煩悸心下痞按之濡者用此湯皆治也由是觀之所謂不定者煩悸之謂也辨誤夫萬物生於天也故天命之謂性性唯一也其能亦唯一也謂之良能然其有多能者性之所枝而岐也非性之本也謂之螺能人之眩螺能而謂性多能者多矣余嘗讀本草舉其主治甚多夫主治也者性之能也一物一性豈有此多能哉今近取譬於人之多能乎夫人之性也有任焉者有清焉者有和焉者有直焉者雖聖人不可移易也而有多能焉有無能焉多能非求於天性之外而成焉無能非求於天性之中而無焉人其性而用之則多能也是善於用其性者也非由天性而多能也故天性任焉者用而多能則盡其性之任而已任之外無有其能也清則清和則和直則直從性之一而貫之不可移易也亦有學而修之以成其多能者若天性然然非去性而然亦與性成者也此所以論於人之道而非所以論於草根木皮也夫善於用人性之能者若彼而況於草根木皮乎性之外無有多能而一草何多能之有夫黃連之苦治心煩也是性之為能也張仲景用焉而治心下痞嘔吐下利之證也是性之所枝而岐也故無心煩之狀者試之無效如心煩者其應如響仲景治心下痞嘔吐下利其方用黃連者甚多斯亦可以徵也由是觀之黃連主治心煩也本草之謬也明矣黃連之能多乎哉不多也品考黃連處處出焉出於本邦越中者為上品世所謂加賀黃連是也貪利之賈成以鬱金色之不可不擇也銼用黃芩治心下痞也旁治胸脅滿嘔吐下利也考證黃芩湯證曰自下利六物黃芩湯證不具也説在互考中乾薑黃連黃芩人參湯證曰吐下小柴胡湯證曰胸脅苦滿大柴胡湯證曰心下痞硬嘔吐而下利柴胡薑桂湯證曰胸脅滿微結心煩葛根黃連黃芩湯證曰利遂不止半夏瀉心湯證曰嘔而腸鳴心下痞以上八方黃芩皆三兩柴胡桂枝湯證曰微嘔心下支結瀉心湯證曰心下痞附子瀉心湯證曰心下痞以上三方黃芩或一兩或一兩半而亦三兩之例上歷觀此諸方黃芩主治心下之病也若嘔吐者若下利者有心下痞之證也則得黃芩即治矣其無此證者終無效焉無他治心下痞也互考黃芩湯條曰太陽與少陽合病自下利者主之蓋六經也者疾醫之所不言也而其有六經之言則後人所攙入焉故不取焉以他例推之心下痞腹強急而下利者此湯主之為則每對若證即用此湯其應如響學者審諸六物黃芩湯其證不具也此方半夏瀉心湯而去黃連甘草加桂枝者也張仲景用人參黃芩也於心下痞而硬者也然則心下痞硬幹嘔下利者此湯主之其無此證則終無效也學者審諸辨誤世醫篤信本草以芩連為寒藥其畏之也如虎狼焉不思之甚矣夫本草論藥之寒熱溫涼終不一定彼以為溫則是以為熱甲以為寒則乙以為涼果孰是而孰非乎蓋醫者之於用藥也譬猶武夫用兵武夫而畏兵不可以為武夫也醫亦然毒藥各有其能各主一病苟有其證者而不用之則終不治也所以不畏焉此而畏之則何以醫為也張仲景用黃芩也治心下痞而已無有他能故心下痞而嘔吐下利則用之即治矣世醫不深察妄以為嘔吐下利之主藥可悲也夫品考黃芩處處出焉出漢土者此為上品也出朝鮮者次之出本邦者下品也銼用柴胡主治胸脅苦滿也旁治寒熱往來腹中痛脅下痞硬考證小柴胡湯證曰胸脅苦滿往來寒熱又云腹中痛又云脅下痞硬柴胡加芒硝湯證曰胸脅滿柴胡去半夏加栝蔞湯證不具也説在互考中柴胡薑桂湯證曰胸脅滿微結又云往來寒熱大柴胡湯證曰心下急鬱郁微煩又曰往來寒熱又曰心下滿痛以上五方柴胡皆八兩柴胡桂枝湯證曰心下支結以上一方柴胡四兩而八兩之例上歷觀此諸方柴胡主治胸脅苦滿也其他治往來寒熱或腹中痛或嘔吐或小便不利此一方之所主治而非一味之所主治也為則按傷寒論中寒熱腹痛嘔吐小便不利而不用柴胡者多矣胸脅苦滿而有前證則柴胡主焉此可以見柴胡之所主治也互考柴胡去半夏加栝蔞湯其證不具也以渴故代半夏以栝蔞也今試諸世所謂瘧疾胸脅苦滿而渴者甚有效焉其無有胸脅苦滿證則終不知也然則胸脅苦滿證其脫也明矣辨誤本草綱目柴胡部中往往以往來寒熱為其主治也夫世所謂瘧疾其寒熱往來也劇矣而有用柴胡而治也者亦有不治也者於是質之仲景氏之書其用柴胡也無不有胸脅苦滿之證今乃施諸胸脅苦滿而寒熱往來者其應猶響之於聲非直瘧也百疾皆然無胸脅苦滿證者則用之無效焉然則柴胡之所主治不在彼而在此品考柴胡處處出焉本草以産於銀州銀縣者為上品也本邦藥鋪所鬻者有二品曰鎌倉柴胡曰河原柴胡也蓋河原柴胡者非柴胡之種也不可用焉鎌倉柴胡者尤佳去須及頭以粗布指拂拭之銼而用焉雷斆陳子承稱柴胡香氣甚矣而本邦之産比諸産漢土者形狀則同氣味則薄因稽諸説嫩則香美也老則不也張元素曰氣味俱清故今用鎌倉柴胡也貝母主治胸膈鬱結痰飲也考證桔梗白散證曰時出濁唾腥臭久久吐膿以上一方貝母三分仲景氏用貝母也特此一方已然考之本草古人用貝母主治鬱結痰飲旁治咳嗽乳汁不下也乃與仲景氏治濁唾腥臭其歸一也已其功於桔梗大同而小異也品考貝母用自漢土來者也銼用焉今本邦間亦出焉不異於漢土産也細辛主治宿飲停水也故治水氣在心下而咳滿或上逆或脅痛考證小青湯證曰心下有水氣乾嘔發熱而咳苓甘五味薑辛湯證曰咳胸滿以上二方細辛皆三兩麻黃附子細辛湯證不具也説在互考中大黃附子湯證曰脅下偏痛桂薑草棗黃辛附湯證曰心下堅大如盤邊如旋杯以上三方細辛皆二兩上歷觀此諸方其咳者上逆者胸滿者脅痛者心下堅大者胸脅心下宿飲停水而所致也用細辛則水飲去而其證已可以見其所主治也互考麻黃附子細辛湯條特云少陰病反發熱而不舉餘證為則按六經也者是後人之攙入而非仲景之古也所謂少陰病者蜷臥小便清利也蜷臥者惡寒甚也惡寒者水病也仲景氏之治惡寒也其用附子者居多又其言曰朮附並走皮中逐水氣也由是觀之惡寒之為水氣也明矣其喘而惡寒有痰飲之變者此方主之桂薑草棗黃辛附湯證不具也説在術條下故不復贅焉辨誤今之為醫者其用藥也瞑眩則栗遽轉其方何無特操之甚也書曰若藥弗瞑眩厥疾弗瘳余每讀書到於此未嘗不廢書抵掌而歡聖哲之言信而有徵也仲景之為方也亦有徵矣請舉其一二苓甘五味薑辛夏湯條曰咳滿即止而更復渴沖氣復發者以細辛乾薑也而仍用細辛乾薑此非審知此毒而治此疾者孰能之為嗚呼仲景哉朮附湯條曰其人如冒狀勿怪即是朮附並走皮中逐水氣未得除故耳此亦瞑眩之謂也夫欲為仲景氏者其要在知藥之瞑眩而疾乃瘳焉而後就其方法審其藥功而已為則從事於此審試諸藥本草所謂大毒者其不徹疾也不瞑眩所謂無毒者亦中肯綮也必瞑眩瞑眩也疾斯瘳也余未見藥弗瞑眩而疾之為瘳者也嗚呼聖哲之言信而有徵哉學者思諸品考細辛本邦稱云真細辛者即是也洗去塵土銼而用之藥鋪間以杜衡充細辛也不可不辨矣當歸芎藭仲景之方中用當歸芎藭者其所主治不可的知也今不敢鑿從成方而用焉是闕如之義也辨誤本草以當歸芎藭治血為産後要藥為則按仲景氏治血方中無此二藥者多而治他證之方中亦有此二藥如奔豚湯當歸羊肉湯酸棗仁湯類是也由是觀之不可概為治血之藥也品考當歸江州伊噴山所産其味辛同漢土所産而和州所産味甘此以糞土培養之者也不可用矣孫思邈曰無當歸以芎藭代之今試嘗和州當歸其味大不似芎藭也伊噴當歸則似焉故用之也芎藭出本邦豐後州者上品也芍藥主治結實而拘攣也旁治腹痛頭痛身體不仁疼痛腹滿咳逆下利腫膿考證桂枝加芍藥湯證曰腹滿時痛小建中湯證曰腹中急痛桂枝加大黃湯證曰大實痛以上三方芍藥皆六兩枳實芍藥散證曰腹痛煩滿排膿散證闕説在類聚方以上二方芍藥一方等分一方六分芍藥甘草湯證曰腳攣急桂枝加芍藥生薑人參新加湯證曰身疼痛芎歸膠艾湯證曰腹中痛以上三方芍藥皆四兩芍藥甘草附子湯證不具也説在互考中以上一方芍藥三兩而亦四兩之例小青龍湯證曰咳逆大柴胡湯證曰心下滿痛又曰嘔吐而下利附子湯證曰身體痛真武湯證曰腹痛又云沉重疼痛自下利又云咳桂枝湯證曰頭痛又曰身疼痛烏頭湯證曰歷節不可屈伸疼痛又曰拘急黃耆桂枝五物湯證曰身體不仁以上七方芍藥皆三兩黃芩湯證曰自下利柴胡桂枝湯證曰肢節煩疼以上二方用芍藥或二兩或一兩半而亦三兩之例上歷觀此諸方曰腹痛曰頭痛曰腹滿曰咳逆曰下利曰排膿曰四肢疼痛曰攣急曰身體不仁一是皆結實而所致也其所謂痛者拘急也若夫桂枝加芍藥湯小建中湯桂枝加大黃湯皆以芍藥為主藥而其證如此由是觀之主治結實而拘攣也明矣互考小建中湯傷寒論不備其證是以世醫不獲方意以為補劑故其所施也竟無效焉為則按此方出自芍藥甘草湯故主治諸病腹拘急而痛者也學者正焉芍藥甘草附子湯其條特舉惡寒之證此附子之所主也而脫芍藥甘草之所主治也其用甘草者治毒急迫也其用芍藥者治拘攣也然則拘攣急迫而惡寒者此湯主之真武湯附子湯特有生薑人參之異而所主治則頗異也真武湯苓芍為主而附子湯朮附為主也二方所主治斯可以見也已辨誤朱震亨曰産後不可用芍藥以其酸寒伐生髮之氣也李時珍曰白芍藥益脾能於土中瀉木産後肝血已虛不可更瀉故禁之夫酸寒之藥蓋不少矣何獨避芍藥之為世醫雷同其説不思之甚矣諸藥皆毒毒而治毒毒而不用毒何治之有金匱要略曰産後腹痛枳實芍藥散主之千金方曰産後虛羸腹中刺痛當歸建中湯主之此皆芍藥主藥而用之於産後也且也張仲景芍藥甘草湯芍藥甘草附子湯桂枝加芍藥湯皆以芍藥為主而於血證無毫關涉焉特治結實而拘攣已若乃酸寒伐生髮之氣及瀉木之説此鑿空之論而非疾醫之用也品考芍藥其種有二曰木芍藥也曰草芍藥也木芍藥是其真也花容綽約亦可愛也余取之矣服食家言白花勝赤花嘗試其功赤白惟均也服食家之説不可從矣草芍藥世所謂宇多芍藥也不可用矣牡丹皮仲景之方中桂枝茯苓丸八味丸大黃牡丹皮湯以上三方雖有牡丹皮而不以為主藥也如此之類皆從其全方之主治而用之如徵姑闕焉以俟之後君子也品考牡丹皮和漢同茵陳蒿主治發黃也考證茵陳五苓散證曰黃疸茵陳蒿湯證曰心胸不安久久發黃以上二方茵陳蒿一方六兩一方十分上觀此二方茵陳蒿治發黃也明矣互考或問曰發黃之證治之之方其不用茵陳蒿者間亦有之如何答曰發黃小便不利或渴無餘證者茵陳五苓散主之發黃大便不通者茵陳蒿湯主之若乃一身盡黃腹脹大便必黑時溏者硝礬散主之發黃心中懊憹柏子大黃豉湯發黃腹滿小便不利大黃硝石湯發黃頭痛惡風自汗出桂枝加黃耆湯發黃嘔逆小半夏湯主之發黃胸脅苦滿小柴胡湯主之發黃腹中拘急小建中湯主之此皆隨證而異方也仲景氏之於茵陳蒿特用之於發黃無他病者而已辨誤世之醫者論黃疸為濕熱其以黃為土色也無益於治此不可從矣品考茵陳蒿和漢無別艾仲景之方中芎歸膠艾湯用艾而非君藥也是以其所主治也不可得而知矣芎歸膠艾湯主治漏下下血也今從其成方而用之辨誤名醫別録曰艾可以灸百病後人不審其證之可灸與否一概行之故罹其害也蓋不鮮矣醫者見之以為不候寒熱之過也不審可否則固已失之矣論寒熱亦未為得也灸者所以解結毒也若夫毒著脊上藥之不知下之不及就其所著而灸之其毒轉而走腹而後藥之為達也臨其可灸之證也我不終問其寒熱而未有逢其害焉有灸而發熱是毒動也世醫以為灸誤非也余於若證灸而不止其毒之散也其熱亦止此即所謂瞑眩而瘳者也凡艾之為用也灸之與煎其施雖異而以其一物也偶爾言及焉灸家言禁穴頗多余家不言之一從靈樞以結毒為腧也大凡灸不止一日乃至五日七日以多日為有效矣一日暴之十日寒之我未見其能治者也品考艾處處出焉所賣者雜它物可正焉麻黃主治喘咳水氣也旁治惡風惡寒無汗身疼骨節痛一身黃腫考證麻黃湯證曰身疼腰痛骨節疼痛惡風無汗而喘甘草麻黃湯證曰里水麻黃醇酒湯證曰黃疸以上三方麻黃四兩或三兩而為君藥大青龍湯證曰惡寒身疼痛不汗出而煩躁越婢湯證曰惡風一身悉腫越婢加朮湯證曰一身面目黃腫越婢加半夏湯證曰其人喘目如脫狀以上四方麻黃皆六兩麻黃杏仁甘草石膏湯證曰汗出而喘牡蠣湯證不具也説在互考中以上二方麻黃皆四兩葛根湯證曰無汗惡風小青龍湯證曰心下有水氣咳而微喘烏頭湯證曰歷節疼痛以上三方麻黃皆三兩麻黃附子甘草湯證不具也説在互考中麻黃附子細辛湯證不具也説在互考中以上二方麻黃二兩上歷觀此數方麻黃主治喘咳水氣也明矣故其證而惡風惡寒無汗身疼骨節痛一身黃腫者用麻黃皆治也互考甘草麻黃湯麻黃醇酒湯唯云里水黃疸而不審其證為則按黃家兼有喘咳惡寒骨節痛之證者麻黃之所主治也牡蠣湯此甘草麻黃湯而加牡蠣蜀漆方也牡蠣治動氣蜀漆主逐水然則世所謂瘧疾動氣在上而喘者此湯主之也外臺祕要特云牡瘧而不舉其證茫乎如舟行無津涯矣麻黃附子甘草湯麻黃附子細辛湯二方其條所謂少陰病者惡寒甚也而有無汗之證故用麻黃也辨誤甚矣世醫之怖麻黃也其言曰吾聞之麻黃能發汗多服之則漉漉汗出不止是以不敢用焉惡是何言也譬怯者之於妖怪足未嘗踏其境而言某地真出妖怪也為則嘗試麻黃之效可用之證而用之汗則出焉雖當夏月而無漉漉不止之患仲景氏言服麻黃後覆取微似汗宜哉學者勿以耳食而飽矣品考麻黃本邦之産未聞而亦有形狀相似者是木賊而非麻黃也朱震亨李時珍言其與麻黃同功則學者試可乃已甄權曰根節止汗試之無效也不可從矣仲景氏曰先煮麻黃去上沫今漢舶所載而來者煮之無上沫共諸藥煮之而可也地黃主治血證及水病也考證八味丸證曰小腹不仁又曰小便不利以上一方地黃八兩芎歸膠艾湯證曰漏下又曰下血以上一方地黃六兩三物黃芩湯證曰在草蓐自發露得風四肢苦煩熱以上一方地黃四兩上歷觀此三方主治血及水而不及其他也互考芎歸膠艾湯三物黃芩湯八味丸皆以地黃為君藥而二方言血證一方言小便不利膠艾湯方中除地黃之外有阿膠當歸芎藭均是治血藥也三物黃芩湯去地黃則其餘無治血藥品也由是觀之古人用地黃並治血證水病也核焉且也施治之法不別血之與水亦明矣辨誤夫水之與血其素同類也亦唯赤則謂之血白則謂之水耳余嘗讀內經曰汗者血之餘也問曰血之餘而汗白者何也答曰肺者主皮毛也肺色白也故汗白也此本於陰陽五行而有害於疾醫之道也疾醫之道殊乎亡也職斯之由可悲也哉夫汗之白也血之赤也其所以然不可得而知也刃之所觸其創雖淺血必出也暑熱之酷衣被之厚汗必出也一是皆歷皮毛而出者或為汗或為血故以不可知為不可知置而不論唯其毒所在而致治焉斯疾醫之道也後世之醫者以八味丸為補腎劑何其妄也張仲景曰腳氣上入少腹不仁者八味丸主之又曰小便不利者又曰轉胞病利小便則愈又曰短氣有微飲當從小便去之一是皆以利小便為其功書云學於古訓乃有獲嗚呼學於古訓斯有獲藥功矣品考地黃本邦處處出焉其出和州者最多而與出漢土者無異也充實為佳藏器曰本經不言生干蒸乾別録云生地黃者乃新掘鮮者是也李時珍曰熟地黃乃後人復蒸曬者諸家本草皆謂乾地黃為熟地黃而今本邦藥鋪以乾地黃為生地黃非也乾者燥干之謂如乾薑是也生者新鮮之名如生薑是也故古人言生地黃則必言汁言之順也豈有干而有汁者哉仲景氏之所用生干二品而已其熟云者後世之為也不可用矣葶藶主治水病也旁治肺癰結胸考證葶藶大棗湯證曰肺癰胸滿脹一身面目浮腫以上一方葶藶搗丸如彈丸大大陷胸丸證曰結胸以上一方葶藶半升己椒藶黃丸證曰腸間有水氣以上一方葶藶一兩上歷觀此三方一皆是主治水病也而二方雲水病一方特云結胸其所謂結胸者用大陷胸丸則水利而疾愈然則葶藶之治水也明矣互考或問曰葶藶大棗湯桔梗湯桔梗白散同治肺癰而異其方何也為則答曰用桔梗之證濁唾腥臭久久吐膿者也用葶藶之證浮腫清涕咳逆喘鳴者也故因其見證而處方不為病名所絆斯為得也淮南子曰葶藶愈脹為則按脹是水病也品考葶藶有甜苦二種而甜者不中用焉本邦未出苦葶藶也或曰關以東間有之大黃主通利結毒也故能治胸滿腹滿腹痛及便閉小便不利旁治發黃瘀血腫膿考證大陷胸湯證曰從心下至少腹硬滿而痛以上一方大黃六兩小承氣湯證曰腹微滿大便不通厚朴三物湯證曰痛而閉者大黃甘遂湯證曰少腹滿如敦狀小便微難大承氣湯證曰腹滿痛者大黃硝石湯證曰黃疸腹滿小便不利桃核承氣湯證曰少腹急結大黃牡丹湯證曰少腹腫痞大黃甘草湯證不具也調胃承氣湯證曰腹脹滿又曰大便不通以上九方大黃皆四兩大黃附子湯證曰脅下偏痛抵當湯證曰少腹硬滿大黃黃連瀉心湯證曰心下痞按之濡桂枝加大黃湯證曰大實痛以上四方大黃或三兩或二兩一兩而亦四兩之例上歷觀此諸方張仲景氏用大黃者特以利毒而已故各陪其主藥而不單用焉合厚朴枳實則治胸腹滿合黃連則治心下痞合甘遂阿膠則治水與血合水蛭虻蟲桃仁則治瘀血合黃柏梔子則治發黃合甘草則治急迫合芒硝則治堅塊也學者審諸仲景方中用大黃者不止於茲而以其用之之徵顯然著明於茲故不復遊贅也辨誤世醫之畏大黃也不啻如蛇蠍其言曰凡用大黃者雖病則治乎損內而死切問而無其人此承本草之訛而吠聲者也非耶仲景氏用下劑其亦多矣可見大黃攻毒之干莫也今也畏其利而用鉛刀宜哉不能斷沉疴也雖大下之後仲景氏未嘗補也亦可以見損內之説妄矣凡藥劑之投拔病之未及以斷其根則病毒之動而未能爽快仍貫其劑也毒去而後爽快雖千萬人亦同世醫素畏下劑故遽見其毒未去也以為元氣虛損豈不亦妄哉品考大黃漢土産有兩品黃色而潤實者為良所謂錦紋大黃也本邦近者有稱漢種大黃者也其效較劣矣銼用大戟主利水也旁治掣痛咳煩考證十棗湯證曰引脅下痛又曰咳煩互考淮南子曰大戟去水品考大戟漢産有兩品綿大戟為良也本邦之産其效較劣甘遂主利水也旁治掣痛咳煩短氣小便難心下滿考證十棗湯證曰引胸下痛乾嘔短氣又曰咳煩大黃甘遂湯證曰小便微難甘遂半夏湯證曰雖利心下續堅滿大陷胸湯證曰短氣躁煩又曰心下滿而硬痛以上四方其用甘遂或三枚或二兩或一錢也為則按芫花大戟甘遂同是利水而甘遂之效最勝矣品考甘遂漢産為勝本邦所産其效較劣附子主逐水也故能治惡寒身體四肢及骨節疼痛或沉重或不仁或厥冷而旁治腹痛失精下利考證大烏頭煎證曰繞臍痛若發則自出汗手足厥冷烏頭湯證曰歷節疼痛不可屈伸烏頭桂枝湯證曰腹中痛逆冷手足不仁以上三方烏頭皆五枚而為君藥也桂枝附子湯證曰身體疼痛不能自轉側桂枝附子去桂加朮湯證曰前證而小便不利大黃附子湯證曰脅下偏痛天雄散證闕説在術部以上四方附子皆三枚桂枝甘草附子湯證曰疼煩不得伸屈附子湯證曰背惡寒又曰身體痛手足寒骨節痛以上二方附子皆二枚四逆湯證曰下利清穀不止身疼痛又曰手足厥冷真武湯證曰腹痛又曰四肢沉重疼痛自下利桂枝加附子湯證曰四肢微急難以伸屈桂枝去芍藥加附子湯證曰惡寒附子粳米湯證曰切痛麻黃附子甘草湯證不具也説在麻黃部麻黃附子細辛湯證不具也説在細辛部附子瀉心湯證曰惡寒桂薑草棗黃辛附湯證不具也説在術部以上九方附子皆一枚上歷觀此諸方其證一是皆水病也桂枝附子去桂加朮湯條曰一服覺身痹半日許再服三服都盡其人如冒狀勿怪即是朮附並走皮中逐水氣未得除故耳烏頭桂枝湯條曰初服二合不知即服三合又不知復加至五合其知者如醉狀得吐者為中病也此二者言附子逐水瞑眩之狀也凡附子中病則無不瞑眩甚者脈絶色變如死人狀頃刻吐出水數升而其所患者頓除也余嘗於烏頭煎知之附子之逐水也明矣互考凡附子大戟甘遂之類同逐水氣而其用之也隨毒所在附子主水氣而骨節及身體疼痛不可屈伸者大戟甘遂則未必然矣桂枝加附子湯附子一枚桂枝附子湯附子三枚四肢微急難以屈伸者用附子一枚身體疼煩不能自轉側者用附子三枚隨其痛劇易附子亦有多少則附子之功可得而知也本草綱目曰天雄散治失精其説曰暖水臟益精誤矣仲景以天雄逐水耳精也水臟也造化之主暖之益之非人力之所及也辨誤本草綱目曰附子性大熱又云大溫夫味之辛酸苦甘鹹食而可知也性之寒熱溫涼嘗而不可知也以不可知也為知一測諸臆其説紛紛吾孰適從夫仲景用附子以逐水為主而不拘熱之有無也若麻黃附子細辛湯大黃附子湯其證豈得謂之無熱乎學者察諸孔子曰名不正則言不順有是哉今所謂中風者非古所謂中風也仲景氏曰頭痛發熱惡風有汗者名曰中風今所謂中風則肢體不遂者而其説昉於金匱要略及千金方於是世之醫者因金匱千金之方治其所謂中風者故無效王安道以其無效也而設一論更建曰類中風蓋類也者類似也而金匱千金之所謂中風豈類傷寒論之所謂中風乎不類也宜其不得其治也為則朝夕苦思參考仲景氏之方今所謂中風者身體疼痛不仁而往往附子之證也今舉一二而徵焉烏頭桂枝湯證曰手足不仁身疼痛也去桂加朮湯證曰身體疼煩不能自轉側桂枝加附子湯證曰四肢微急難以屈伸今有此證而用此方無一不中中則瞑眩疾乃瘳吾故曰今所謂中風者非古所謂中風而仲景氏用附子劑者也不可不知矣品考附子今用本邦之烏頭也出於奧州南部津輕鬆前者是為上品今漢客來鬻者鹽藏而非自然之物也其功能不與古人所論同也李時珍曰及一兩者難得但得半兩以上者皆良今漢客來鬻者大及二兩小不下半兩本邦之烏頭與時珍所説其輕重只同而其效與古人之所用亦只同也於是乎吾不用彼而用此也博物志曰烏頭附子天雄一物也廣雅曰奚毒附子也一年為側子二年為烏喙三年為附子四年為烏頭五年為天雄為則按其效皆同而後世辨別之不可從矣銼用半夏主治痰飲嘔吐也旁治心痛逆滿咽中痛咳悸腹中雷鳴考證大半夏湯證曰嘔吐以上一方半夏二升小半夏湯證曰嘔吐谷不得下小半夏加茯苓湯證曰嘔吐又云眩悸半夏厚朴湯證曰咽中如有炙臠以上三方半夏皆一升半夏瀉心湯證曰嘔而腸鳴生薑瀉心湯證曰脅下有水氣腹中雷嗚甘草瀉心湯證曰腹中雷鳴又云乾嘔小柴胡湯證曰嘔又云咳又云心下悸大柴胡湯證曰嘔不止小青龍湯證曰心下有水氣乾嘔發熱而咳又曰吐涎沫葛根加半夏湯證曰嘔黃芩加半夏生薑湯證曰乾嘔越婢加半夏湯證曰咳苓甘薑味辛夏湯證曰嘔栝蔞薤白半夏湯證曰心痛黃連湯證曰欲嘔吐附子粳米湯證曰腹中雷鳴又云逆滿嘔吐小陷胸湯證曰結胸病正在心下按之則痛以上十四方半夏皆半升半夏苦酒湯證曰咽中傷生瘡甘遂半夏湯證曰心下續堅滿以上二方半夏十四枚或十二枚近半升半夏散證曰咽中痛半夏乾薑散證曰乾嘔吐逆吐涎沫半夏麻黃丸證曰心下悸以上三方半夏諸藥等分上歷觀此諸方半夏主治痰飲嘔吐也明矣其餘諸證嘔而有痰者一是皆半夏治焉互考嘔者生薑主之嘔而有痰者半夏主之小半夏湯五苓散其所治大同而小異小半夏湯治嘔吐有痰飲者五苓散治嘔吐而小便不利也大半夏湯證其載金匱要略者蓋非古也今從外臺祕要之文辨誤余嘗讀本草綱目半夏條曰孕婦忌半夏為其燥津液也不思之甚矣古語有之曰有故無損此證而用此藥夫何忌之有自後人為妊娠而建其藥之禁忌也終使有其證者不得用其藥悲夫夫妊娠者人為而天賦也故仲景氏無有養胎之藥娩身之後亦然故方其有疾而藥也不建禁忌故妊娠嘔吐不止者仲景氏用乾薑人參半夏丸余亦嘗治孕婦留飲掣痛者與十棗湯數劑及期而娩母子不害也古語所謂有故無損者誠然誠然孕婦忌半夏徒虛語耳品考半夏和漢無別銼用焉世醫薑汁掣之此因本草入毒草部而恐畏其毒遂殺其能者也不可從矣芫花主逐水也旁治咳掣痛考證十棗湯證曰引脅下痛又曰咳張仲景氏用芫花莫過於十棗湯也為則試服芫花一味必大瀉水則其逐水也明矣辨誤本草芫花條慎微曰三國志云魏初平中有青牛先生常服芫花年百餘歲常如五六十時珍曰芫花乃下品毒物豈堪久服此方外迂怪之言不足信也為則曰方外迂怪之説固無論於疾醫之道也下品毒物豈堪久服時珍過矣時珍過矣有病毒而毒藥以攻之豈不堪久服邪學者勿眩焉品考芫花漢産為良本邦亦出焉本邦所産今之所鬻者頗多偽也不可不正矣本邦俗稱志計武志是真芫花也五味子主治咳而冒者也考證小青龍湯證曰咳苓桂五味甘草湯證曰時覆冒以上二方五味子皆半升上觀此二方則五味子所主治也咳而冒者明矣互考五味子澤瀉皆主治冒者而有其別五味子治咳而冒者澤瀉治眩而冒者也辨誤余嘗讀本草有五味子收肺補腎之言是非疾醫之言也原其為説由五臟生克而來也夫疾醫之道熄而邪術起臆測之説於是乎行無益於治也不可從矣品考五味子朝鮮之産是為上品漢次之本邦之産其品稍劣銼用栝蔞實主治胸痹也旁治痰飲考證小陷胸湯證曰結胸栝蔞薤白白酒湯證曰胸痹喘息咳唾栝蔞薤白半夏湯證曰胸痹不得臥枳實薤白桂枝湯證曰胸痹以上四方栝蔞實皆一枚上歷觀諸方其治胸痹及痰飲也明矣所謂胸痹者胸膈痞塞是也互考枳實薤白桂枝湯條曰胸痹云云枳實薤白桂枝湯主之人參湯亦主之金匱要略往往有此例此非仲景之古也夫疾醫之處方也各有所主豈可互用乎胸痹而胸滿上氣喘息咳唾則枳實薤白桂枝湯主之胸痹而心下痞硬則人參湯主之此所以不可相代也學者思諸品考栝蔞實頌曰其形有正圓者有鋭而長者功用皆同今用世所謂玉章者李時珍曰栝蔞古方全用後世乃分子瓤各用今從古也葛根主治項背強也旁治喘而汗出考證葛根黃連黃芩湯證曰喘而汗出説在互考中以上一方葛根半斤葛根湯證曰項背強葛根加半夏湯證不具也説在互考中桂枝加葛根湯證曰項背強以上三方葛根皆四兩為則曰葛根主治項背強急也葛根湯及桂枝加葛根湯皆足以徵焉互考葛根黃連黃芩湯其用葛根最多而無項背強急之證蓋闕文也施諸下利喘而汗出者終無有效也項背強急而有前證者即是影響也其文之闕斯可知也耳矣葛根加半夏湯條曰太陽與陽明合病此須疾醫之言也不取焉葛根湯證而嘔者此方即主之也品考葛根和漢無異種藥鋪所謂生乾者是為良也銼用防己主治水也考證木防己湯證曰支飲防己茯苓湯證曰四肢腫防己黃耆湯證曰身重又曰腫及陰以上三方防己皆四兩己椒藶黃丸證曰腸間有水氣以上一方防己一兩上歷觀此諸方其治水也明矣未見施諸他證者也互考木防己湯人參為君故治心下痞堅而有水者防己茯苓湯茯苓為君故治四肢聶聶動而水腫者防己黃耆湯黃耆為君故治身重汗出而水腫者仲景氏用防己未見以為君藥者也而其治水也的然明矣品考防己有漢木二種余家用所謂漢防己者也為則按木防己出漢中者謂之漢防己譬如漢術遼五味子也後世岐而二之其莖謂之木防己可謂誤矣余試用所謂木防己者終無寸效而所謂漢防己者能治水也於是斷乎用之陶弘景曰大而青白色虛軟者好墨點木強者不佳李當之曰其莖如葛蔓延其根外白內黃如桔梗內有黑紋如車輻解者良頌曰漢中出者破之文作車輻解黃實而香莖梗甚嫩苗葉小類牽牛折其莖一頭吹之氣從中貫如木通然它處者青白虛軟又有腥氣皮皺上有丁足子名木防己蘇恭曰木防己不任用也
