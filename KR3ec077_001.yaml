body:
  text: 卷上石膏主治煩渴也旁治譫語煩躁身熱考證白虎湯證曰譫語遺尿白虎加人參湯證曰大煩渴白虎加桂枝湯證曰身無寒但熱以上三方石膏皆一斤越婢湯證曰不渴續自汗出無大熱不渴非全不渴之謂無大熱非全無大熱之謂也説在外傳中麻黃杏仁甘草石膏湯證不具也説在類聚方以上二方石膏皆半斤大青龍湯證曰煩躁木防己湯證不具也説在類聚方以上二方石膏皆雞子大也為則按雞子大即半斤也木防己湯石膏或為三枚或為十二枚其分量難得而知焉今從旁例以為雞子大也上歷觀此諸方石膏主治煩渴也明矣凡病煩躁者身熱者譫語者及發狂者齒痛者頭痛者咽痛者其有煩渴之證也得石膏而其效核焉互考傷寒論曰傷寒脈浮發熱無汗其表不解者不可與白虎湯渴欲飲水無表證者白虎加人參湯主之為則按上云不可與白虎湯下云白虎加人參湯主之上下恐有錯誤也於是考諸千金方揭傷寒論之全文而白虎湯加人參湯作白虎湯是也今從之傷寒論中白虎湯之證不具也千金方舉其證也備矣今從之辨誤名醫別録言石膏性大寒自後醫者怖之遂至於置而不用焉仲景氏舉白虎湯之證曰無大熱越婢湯之證亦云而二方主用石膏然則仲景氏之用藥不以其性之寒熱也可以見已余也篤信而好古於是乎為渴家而無熱者投以石膏之劑病已而未見其害也方炎暑之時有患大渴引飲而渴不止者則使其服石膏末煩渴頓止而不復見其害也石膏之治渴而不足怖也斯可以知已陶弘景曰石膏發汗是不稽之説而不可以為公論仲景氏無斯言意者陶氏用石膏而汗出即愈夫毒藥中病則必瞑眩也瞑眩也則其病從而除其毒在表則汗在上則吐在下則下於是乎有非吐劑而吐非下劑而下非汗劑而汗者是變而非常也何法之為譬有盜於梁上室人交索之出於右則順而難逃逾於左則逆而易逃然則雖逆乎從其易也毒亦然仲景曰與柴胡湯必蒸蒸而振卻發熱汗出而解陶氏所謂石膏發汗蓋亦此類也已陶氏不知而以為發汗之劑不亦過乎後世以石膏為峻藥而怖之太甚是不學之過也仲景氏之用石膏其量每多於他藥半斤至一斤此蓋以其氣味之薄故也余嘗治青山候臣蜂大夫之病其證平素毒著脊上七椎至十一椎痛不可忍發則胸膈煩悶而渴甚則冒而不省人事有年數矣一日大發衆醫以為大虛為作獨參湯貼二錢日三服六日未知也醫皆以為必死於是家人召余診之脈絶如死狀但診其胸微覺有煩悶狀乃作石膏黃連甘草湯與之一劑之重三十五錢以水一盞六分煮取六分頓服自昏至曉令三劑盡通計一百有五錢及曉其證猶夢而頓覺次日余辭而歸京師病客曰一旦訣別吾則不堪請與君行朝夕於左右遂俱歸京師為用石膏如故居七八十許日而告瘳石膏之非峻藥而不可怖也可以見焉爾品考石膏本邦處處出焉加州奧州最多而有硬軟二種軟者上品也別録曰細理白澤者良雷斆曰其色瑩淨如水精李時珍曰白者潔淨細文短密如束針為則曰採石藥之道下底為佳以其久而能化也採石膏於其上頭者狀如米糕於其下底者瑩淨如水精此其上品也用之之法唯打碎之已近世火煅用之此以其性為寒故也臆測之為也余則不取焉大凡製藥之法制而倍毒則制之去毒則不是毒外無能也諸藥之下其當制者詳其制也不制者不下皆效之滑石主治小便不利也旁治渴也考證豬苓湯證曰渴欲飲水小便不利以上一方滑石一兩上此一方斯可見滑石所主治也滑石白魚散證曰小便不利蒲灰散證曰小便不利余未試二方是以不取徵焉互考余嘗治淋家痛不可忍而渴者用滑石礬甘散其痛立息屢試屢效不可不知也品考滑石和漢共有焉處處山谷多出之也軟滑而白者入藥有效宗奭曰滑石今之畫石因其軟滑可寫畫也時珍曰其質滑膩故以名之芒硝主軟堅也故能治心下痞堅心下石硬小腹急結結胸燥屎大便硬而旁治宿食腹滿小腹腫痞之等諸般難解之毒也考證大陷胸湯證曰心下痛按之石硬以上一方芒硝一升分量可疑故從千金方大陷胸丸作大黃八兩芒硝五兩大陷胸丸證曰結胸項亦強以上一方芒硝半斤分量亦可疑故從千金方作五兩調胃承氣湯證曰腹脹滿又曰大便不通又曰不吐不下心煩以上一方芒硝半斤分量亦可疑今考千金方外臺祕要此方無有焉故姑從桃核承氣湯以定芒硝分量柴胡加芒硝湯證不審備也説在互考中以上一方芒硝六兩大承氣湯證曰燥屎又曰大便硬又曰腹滿又曰宿食大黃牡丹湯證曰小腹腫痞木防己去石膏加茯苓芒硝湯證曰心下痞堅云云復與不愈者以上三方芒硝皆三合大黃硝石湯證曰腹滿以上一方硝石四兩橘皮大黃朴硝湯證曰鱠食之在心胸間不化吐復不出桃核承氣湯證曰少腹急結以上二方朴硝芒硝皆二兩硝礬散證曰腹脹以上一方硝石等分上歷觀此數方芒硝主治堅塊明矣有軟堅之功也故旁治宿食腹滿少腹腫痞之等諸般難解者也互考柴胡加芒硝湯是小柴胡湯而加芒硝者也而小柴胡湯主治胸脅苦滿不能治其塊所以加芒硝也見人參辨誤中説則可以知矣品考硝石和漢無別朴硝芒硝硝石本是一物而各以形狀名之也其能無異而芒硝之功勝矣故余家用之甘草主治急迫也故治裡急急痛攣急而旁治厥冷煩躁沖逆之等諸般迫急之毒也考證芍藥甘草湯證曰腳攣急甘草乾薑湯證曰厥咽中干煩躁甘草瀉心湯證曰心煩不得安甘薑甘草湯證曰咽燥而渴桂枝人參湯證曰利下不止以上五方甘草皆四兩芍藥甘草附子湯證不具也説在互考中甘麥大棗湯證曰藏躁喜悲傷欲哭以上二方甘草皆三兩甘草湯證曰咽痛者桔梗湯證不具也説在互考中桂枝甘草湯證曰叉手自冒心桂枝甘草龍骨牡蠣湯證曰煩躁四逆湯證曰四肢拘急厥逆甘草粉蜜湯證曰令人吐涎心痛發作有時毒藥不止以上六方甘草皆二兩上八方甘草二兩三兩而亦四兩之例苓桂甘棗湯證曰臍下悸苓桂五味甘草湯證曰氣從小腹上衝胸咽小建中湯證曰裡急半夏瀉心湯證曰心下痞小柴胡湯證曰心煩又云胸中煩小青龍湯證曰咳逆倚息黃連湯證曰腹中痛人參湯證曰逆搶心旋覆花代赭石湯證曰心下痞硬噫氣不除烏頭湯證曰疼痛不可屈伸又云拘急不得轉側以上十方甘草皆三兩排膿湯證闕説在桔梗部謂胃承氣湯證曰不吐不下心煩桃核承氣湯證曰其人如狂又云少腹急結桂枝加桂湯證曰奔豚氣從少腹上衝心桂枝去芍藥加蜀漆龍骨牡蠣湯證曰驚狂起臥不安以上五方甘草皆二兩上歷觀此諸方無論急迫其他曰痛曰厥曰煩曰悸曰咳曰上逆曰驚狂曰悲傷曰痞硬曰利下皆甘草所主而有所急迫者也仲景用甘草也其急迫劇者則用甘草亦多不劇者則用甘草亦少由是觀之甘草之治急迫也明矣古語曰病者苦急急食甘以緩之其斯甘草之謂乎仲景用甘草之方甚多然其所用者不巡前證故不枚舉焉凡徵多而證明者不枚舉其徵下皆效之互考甘草湯證曰咽痛者可與甘草湯不差者與桔梗湯凡其急迫而痛者甘草治之其有膿者桔梗治之今以其急迫而痛故與甘草湯而其不差者已有膿也故與桔梗湯據此推之則甘草主治可得而見也芍藥甘草附子湯其證不具也為則按其章曰發汗病不解反惡寒是惡寒者附子主之而芍藥甘草則無主證也故此章之義以芍藥甘草湯腳攣急者而隨此惡寒則此證始備矣為則按調胃承氣湯桃核承氣湯俱有甘草而大小承氣湯厚朴三物湯皆無甘草也調胃承氣湯證曰不吐不下心煩又曰鬱郁微煩此皆其毒急迫之所致也桃核承氣湯證曰或如狂或少腹急結是雖有結實然狂與急結此皆為急迫故用甘草也大小承氣湯厚朴三物湯大黃黃連瀉心湯俱解其結毒耳故無甘草也學者詳諸辨誤陶弘景曰此草最為衆藥之主孫思邈曰解百藥之毒甄權曰諸藥中甘草為君治七十二種金石毒解一千二百般草木毒調和衆藥有功嗚呼此説一出而天下無復知甘草之本功不亦悲哉若從三子之説則諸凡解毒唯須此一味而足矣今必不能然則其説之非也可以知已夫欲知諸藥本功則就長沙方中推歷其有無多少與其去加引之於其證則其本功可得而知也而長沙方中無甘草者居半不可謖衆藥之主也亦可以見已古語曰攻病以毒藥藥皆毒毒即能若解其毒何功之有不思之甚矣學者察諸夫陶弘景孫思邈者醫家之俊傑博治之君子也故後世尊奉之至矣而謂甘草衆藥之主謂解百藥之毒豈得無徵乎考之長沙方中半夏瀉心湯本甘草三兩而甘草瀉心湯更加一兩是足前為四兩而誤藥後用之陶孫蓋卒爾見之謂為解藥毒也嗚呼夫人之過也各於其黨故觀二子之過斯知尊信仲景之至矣向使陶孫知仲景誤藥後所以用甘草與不必改其過何也陶孫誠俊傑也俊傑何為文其過乎由是觀之陶孫實不知甘草之本功也亦後世之不幸哉東垣李氏曰生用則補脾胃不足而大瀉心火炙之則補三焦元氣而散表寒是仲景所不言也五藏浮説戰國以降今欲為疾醫乎則不可言五藏也五藏浮説戰國以降不可從也品考甘草華産上品本邦所産者不堪用也余家唯銼用之也黃耆主治肌表之水也故能治黃汗盜汗皮水又旁治身體腫或不仁者考證耆芍桂枝苦酒湯證曰身體腫發熱汗出而渴又云汗沾衣色正黃加蘖汁防己黃耆湯證曰身重汗出惡風以上二方黃耆皆五兩防己茯苓湯證曰四肢腫水氣在皮膚中黃耆桂枝五物湯證曰身體不仁以上二方黃耆皆三兩桂枝加黃耆湯證曰身常暮盜汗出者又云從腰以上必汗出下無汗腰臗弛痛如有物在皮中狀以上一方黃耆二兩黃耆建中湯證不具也以上一方黃耆一兩半上歷觀此諸方黃耆主治肌表之水也故能治黃汗盜汗皮水又能治身體腫或不仁者是腫與不仁亦皆肌表之水也互考耆芍桂枝苦酒湯桂枝加黃耆湯同治黃汗也而耆芍桂枝苦酒湯證曰汗沾衣是汗甚多也桂枝加黃耆湯證曰腰以上必汗出下無汗是汗少也以此考之汗之多少即用黃耆多少則其功的然可知矣防己黃耆湯防己茯苓湯同治肌膚水腫也而黃耆有多少防己黃耆湯證曰身重汗出防己茯苓湯證曰水氣在皮膚中此隨水氣多少而黃耆亦有多少則黃耆治肌表之水明矣故耆芍桂枝苦酒湯桂枝加黃耆湯隨汗之多少而用黃耆亦有多少也黃耆桂枝五物湯證曰身體不仁為則按仲景之治不仁雖隨其所在處方不同而歷觀其藥皆是治水也然則不仁是水病也故小腹不仁小便不利者用八味丸以利小便則不仁自治是不仁者水也學者思諸防己黃耆湯金匱要略載其分量與外臺祕要異為則夷考其得失外臺祕要古而金匱要略不古矣故今從其古者也辨誤余嘗讀本草載黃耆之功陶弘景曰補丈夫虛損五勞羸瘦益氣甄權曰主虛喘腎衰耳聾內補嘉謨曰人參補中黃耆實表也余亦嘗讀金匱要略審仲景之處方皆以黃耆治皮膚水氣未嘗言補虛實表也為則嘗聞之周分置醫職四焉曰食醫曰疾醫曰瘍醫曰獸醫夫張仲景者蓋古疾醫之流也夫陶弘景尊信仙方之人也故仲景動言疾病而弘景動論養氣談延命未嘗論疾病後世之喜醫方者皆眩其俊傑而不知其有害於疾醫也彼所尊信而我尊信之滔滔者天下皆是也豈不亦悲哉夫逐奔獸者不見大山嗜欲在外則聰明所蔽故其見物同而用物之異仲景主疾病者也弘景主延命者也仲景以黃耆治水氣弘景以之補虛夫藥者毒也毒藥何補之為是以不補而為補以不補而為補是其聰明為延命之欲所蔽也古語曰邪氣盛則實精氣奪則虛夫古所謂虛實者以其常而言之也昔者常無者今則有之則是實也昔者常有者今則無之則是虛也邪者常無者也精者常有者也故古所謂實者病也而虛者精也因病而虛則毒藥以解其病毒而復其故也非病而虛則非毒藥之所治也以穀肉養之故曰攻病以毒藥養精以穀肉果菜今試論之天寒肌膚粟起當此時服黃耆而不已也以衣衾則已以衣衾而不已也啜粥而已無他是非病而精虛也若乃手足拘急惡寒是與衣衾而不已也啜粥而不已也與毒藥而已也無他是邪實也嗚呼仲景氏哉信而有徵此孔子所以非法言不敢道也甄權嘉謨不言疾醫之法言也抑亦弘景禍之矣言必以仙方必以陰陽此耆功之所以不著也品考黃耆漢土朝鮮本邦皆産也漢土出綿上者以為上品其他皆下品也其出朝鮮本邦者亦皆下品也今華舶之所載而來者多是下品不可不擇也凡黃耆之品柔軟肉中白色潤澤味甘是為上品也銼用人參主治心下痞堅痞硬支結也旁治不食嘔吐喜唾心痛腹痛煩悸考證木防己湯證曰心下痞堅以上一方人參四兩人參湯證曰心中痞又曰喜唾久不了了桂枝人參湯證曰心下痞硬半夏瀉心湯證曰嘔而腸鳴心下痞生薑瀉心湯證曰心下痞硬乾噫食臭甘草瀉心湯證曰心下痞硬而滿乾嘔心煩又曰不欲飲食惡聞食臭小柴胡湯證曰默默不欲飲食心煩喜嘔又云胸中煩又云心下悸又云腹中痛吳茱萸湯證曰食谷欲嘔又曰乾嘔吐涎沫大半夏湯證曰嘔而心下痞硬茯苓飲證曰氣滿不能食乾薑黃連黃芩人參湯證曰食入口即吐桂沉加芍藥生薑人參新加湯證不具也説在互考中六物黃芩湯證曰乾嘔白虎加人參湯證不具也説在互考中生薑甘草湯證曰咳唾涎沫不止以上十四方人參皆三兩柴胡桂枝湯證曰心下支結乾薑人參半夏丸證曰嘔吐不止四逆加人參湯證不具也説在互考中以上三方其用人參者或一兩半或一兩而亦三兩之例附子湯證不具也説在互考中黃連湯證曰腹中痛欲嘔吐旋覆花代赭石湯證曰心下痞硬噫氣不除大建中湯證曰心胸中大寒痛嘔不能飲食以上四方人參皆二兩上歷觀此諸方人參主治心下結實之病也故能治心下痞堅痞硬支結而旁治不食嘔吐喜唾心痛腹痛煩悸亦皆結實而所致者人參主之也為則按人參黃連茯苓三味其功大同而小異也人參治心下痞硬而悸也黃連治心中煩而悸也茯苓治肉瞤筋惕而悸也不可不知矣互考木防己湯條曰心下痞堅愈復發者去石膏加茯苓芒硝湯主之是人參芒硝分治心下痞硬之與痞堅也於是乎可見古人用藥不苟也蓋其初心下痞堅猶緩謂之痞硬亦可故投以人參也復發不愈而痞之堅必矣故投以芒硝也半夏瀉心湯脫硬字也甘草瀉心湯此方中倍甘草生薑瀉心湯加生薑之湯也而共云治心下痞硬則此方脫硬字也明矣吳茱萸湯茯苓飲乾薑黃連黃芩人參湯六物黃芩湯生薑甘草湯皆人參三兩而云治咳唾涎沫嘔吐下利不云治心下痞硬於是綜考仲景治咳唾涎沫嘔吐下利方中其無人參者有居八九今依人參之本例用此五湯施之於心下痞硬而咳唾涎沫嘔吐下利者其應如響也由是觀之五湯之證一是皆心下痞硬之毒也矣桂枝加芍藥生薑人參新加湯其證不具也其云發汗後身疼痛是桂枝湯證也然則芍藥生薑人參之證闕也説在類聚方白虎加人參湯四條之下俱是無有人參之證蓋張仲景之用人參三兩必有心下痞硬之證此方獨否因此考核千金方外臺祕要共作白虎主之故今盡從之乾薑人參半夏丸依本治之例試推其功心下有結實之毒而嘔吐不止者實是主之大抵與大半夏湯之所主治也大同小異而有緩急之別四逆加人參湯其證不具也惡寒脈微而復利是四逆湯之所主而不見人參之證也此方雖加人參僅一兩無見證則何以加之是脫心下之病證也明矣附子湯證不具也此方之與真武湯獨差一味而其於方意也大有徑庭附子湯朮附君藥而主身體疼痛或小便不利或心下痞硬者真武湯茯苓芍藥君藥而主肉瞤筋惕拘攣嘔逆四肢沉重疼痛者旋覆花代赭石湯其用人參二兩而有心下痞硬之證此小半夏湯加減之方也二兩疑當作三兩也辨誤甄權曰參補虛誤矣此言一出流毒千載昔者張仲景之用參也防己湯莫多焉其證曰支飲喘滿心下痞堅面色黧黑未嘗見言補虛者也又曰虛者即愈實者三日復發復與而不愈者去石膏加茯苓芒硝湯主之此其所由誤者乎則有大不然蓋漢以降字詁不古者多矣則難其解古語曰有為實也無為虛也故用防己湯而心下痞堅已虛而無者則即愈也雖則即愈也心下痞堅猶實而有者三日復發復與防己湯而不愈者非特痞硬即是堅也非參之所主而芒硝主之故參如故而加芒硝茯苓由是觀之不可謂參補虛也孫思邈曰無參則以茯苓代之此説雖誤然參不補虛而治心下疾也亦足以徵耳蓋參補虛之説昉於甄權滔滔者天下皆是本草終引廣雅五行記是參之名義而豈參之實乎學者詳諸余讀本草至參養元氣未嘗不發書而漢也曰嗚呼可悲哉人之惑也所謂元氣者天地根元之一氣也動為陽靜為陰陰陽妙合斯生萬物命其主宰曰造化之神也而人也者非造化之神也故人生於人而神不能生人況於元氣乎夫人之元氣也免身之初所資以生醫家所謂先天之氣也養之以穀肉果菜所謂後天之氣也雖然元氣之説聖人不言故經典不載焉戰國以降始有斯言鶡冠子曰天地成於元氣董仲舒春秋繁露曰王正則元氣和順揚雄解嘲曰大氣含元氣孔安國虞書注曰昊天謂元氣廣大漢書律曆志曰大極元氣函為一班固東都賦曰降煙熅調元氣此數者皆言天地之元氣而非人之元氣也素問曰天之大氣舉之言系地於中而不墜也又曰三焦者原氣之別使言皮膚毫毛之末溫緩之氣也此猶可言也然論説之言也於疾醫何益之有又曰養精以穀肉果菜是古之道也未聞以草根木皮而養人之元氣蓋其説出於道家道家所雅言延命長壽故立無氣以為極也秦漢以降道家降盛而陰陽五行元氣之説蔓延不可芟醫道湮晦職此之由豈可不歡哉夫醫術人事也元氣天事也故仲景不言矣養精以穀肉果菜而人參養元氣未嘗有言之由此觀之其言養元氣者後世之説也不可從矣東垣李氏曰張仲景云病人汗後身熱亡血脈沉遲者下利身涼脈微血虛者並加人參也古人之治血脫者益氣也血不自生須生陽氣蓋陽氣生則陰長而血乃旺也今歷考傷寒論中曰利止亡血也四逆加人參湯主之李氏其據此言乎然而加人參僅僅一兩也四逆加人參湯更加茯苓此為茯苓四逆湯而不舉血證則人參之非為亡血也可以見已且也仲景治吐血衄血産後亡血方中無有人參則益足證也李氏之説妄哉自後苟有血脫者則不審其證概用人參亦益妄哉或問曰吾子言仲景用人參治心下痞硬而大黃黃連瀉心湯之屬無有人參豈亦有説乎曰有之何子讀書之粗也大黃黃連瀉心湯曰心下痞按之濡其於人參則諸方皆曰心下痞硬硬濡二字斯可以見其異矣品考人參出上黨者古為上品朝鮮次之今也上黨不出而朝鮮亦少也其有自朝鮮來者味甘非其真性故試諸仲景所謂心下痞硬而無效也不可用矣源順和名抄云人參此言久末乃伊蓋本邦之俗謂熊膽為久末乃伊而亦號人參則以其味名也由是觀之本邦古昔所用者其味苦也亦明矣今試取朝鮮之苗而樹藝諸本邦者其味亦苦也然則其苦也者是人參之正味而桐君雷公之所同試也乃今余取産於本邦諸國者用之大有效於心下痞硬其産於本邦諸國者五葉三丫其於形狀也亦與所産於朝鮮同矣産於本邦諸國者於和州金峰者最良去土氣而銼用謹勿殺苦也桔梗主治濁唾腫膿也旁治咽喉痛考證排膿湯證闕桔梗白散證曰出濁唾腥臭久久吐膿桔梗湯證曰出濁唾腥臭久久吐膿排膿散證闕以上四方其用桔梗者或三兩或一兩或三分或二分上四方者皆仲景之方也而排膿湯以桔梗為君藥也不載其證今乃歷觀其用桔梗諸方或肺癰或濁唾腥臭或吐膿也而以桔梗為君藥者名為排膿則其排膿也明矣互考排膿湯之證雖闕而桔梗湯觀之則其主治明矣桔梗湯證曰出濁唾腥臭久久吐膿仲景曰咽痛者可與甘草湯不差者與桔梗湯也是乃甘草者緩其毒之急迫也而濁唾吐膿非甘草之所主故其不差者乃加桔梗也由是觀之腫痛急迫則桔梗湯濁唾吐膿多則排膿湯辨誤排膿湯及散載在金匱腸癰部桔梗湯及白散亦有肺癰之言蓋腸癰肺癰之論自古而紛如也無有明辨欲極之而不能也人之體中不可見也故謂無肺癰腸癰者妄也謂有肺癰腸癰者亦妄也凡吐下臭膿者其病在胸也而為肺癰其病在腹也而為腸癰其亦可也治之之法不為名所拘而隨其證是為仲景也品考桔梗處處出焉藥鋪所鬻者淅而白潔脫其氣味也不可不擇焉唯去其土泥而不殺其真性是為良也銼用術主利水也故能治小便自利不利旁治身煩疼痰飲失精眩冒下利喜唾考證天雄散證闕説在互考中以上一方術八兩桂子附子去枝加朮湯證曰小便自利麻黃加朮湯證曰身煩疼越婢加朮湯證曰一身面目黃腫其脈沉小便不利附子湯證不具也説在互考中以上四方術皆四兩桂枝去桂加苓朮湯證曰小便不利人參湯證曰喜唾桂枝人參湯證曰利下不止茯苓澤瀉湯證不具也説在類聚方茯苓飲證曰心胸中有停痰宿水自吐出水以上五方術皆三兩甘草附子湯證曰小便不利真武湯證曰小便不利四肢沉重疼痛自下利苓薑朮甘湯證曰小便自利苓桂朮甘湯證曰小便自利苓桂朮甘湯證曰心下有痰飲又云頭眩澤瀉湯證曰其人苦冒眩枳朮湯證不具也説在互考中茯苓戎鹽湯證曰小便不利以上七方術皆二兩五苓散證曰小便不利以上一方術十八銖而三兩之例上歷觀此諸方無論小便之變其他曰飲曰痰曰身煩疼曰喜唾曰冒眩亦皆水病也凡小便不利而兼若證者用術而小便通則諸證乃治由是觀之術之利水也明矣互考天雄散金匱要略載在桂枝加龍骨牡蠣湯條後而不載其證而李時珍作本草綱目曰此仲景治男子失精之方也然則舊有此證而今或脫也男子失精女子夢交桂枝龍骨牡蠣湯主之下當云天雄散亦主之以余觀之時珍之見而豈以朮附為治失精夢交乎此則觀於本草可以知耳夫失精夢交水氣之變也故以術為主藥也金匱要略白朮附子湯即傷寒論中桂枝附子去桂加朮湯而分量減其半也蓋術別蒼白非古也故今稱方名從傷寒論焉外臺祕要朮附湯亦同方而分量非古也皆不可從焉附子湯證不具也此方之於真武湯倍加朮附以參代薑者也而真武湯證有小便不利或疼痛或下利此方倍加朮附則豈可無若證乎其證闕也明矣枳朮湯桂薑棗草黃辛附湯二方金匱要略所載同其因與證而不可別焉今審其方劑桂薑棗草黃辛附湯其方合桂枝去芍藥及麻黃附子細辛也而桂枝去芍藥湯主頭痛發熱惡風有汗等證而腹中無結實者也麻黃附子細辛湯證曰少陰病發熱為則按所謂少陰病者惡寒甚者也故用附子附子主惡寒也依二湯之證推之心下堅大而惡寒發熱上逆者桂薑棗草黃辛附湯主之術主利水也是以心下堅大而小便不利者枳朮湯主之夫秦張之治疾也從其證而不取因矣因者想像也以冥冥決事秦張所不取也故其能治疾也在方中其證矣斯不知其方意則未能中其證也其知其方意在知藥能也能知藥能而後始可與言方已辨誤本事方許叔微曰微患飲澼三十年後左下有聲脅痛食減嘈雜飲酒半杯即止十數日必嘔酸水數升暑月止右邊有汗左邊絶無自揣必有澼囊如水之有科臼不盈科不行但清者可行而濁者停滯無路以決之故積至五六日必嘔而去脾土惡濕而水則流濕莫若燥脾以去濕崇土以填科臼乃悉屏諸藥只以蒼朮麻油大棗丸服三月而疾除自此常服不嘔不痛胸膈寬利飲啖如故為則按仲景用術治水而不云去濕補脾也許氏則以術為去濕補脾而不云其治水何其妄哉許氏之病水變故得術能治也人云許氏能治其濕痰余戲之曰非許自能治其病而術能治許病也何則許氏之所説以不可見為見而以不可知為知也空理惟依古人則不然有水聲吐水則為水治之是可知而知之可見而見之實事惟為此謂知見之道也故有許氏之病者用朮附以逐其水其效如神嗚呼仲景之為方也信而有徵由是觀之許之病已也非許之功而術之功也品考術宗奭曰古方及本經止單言術而未別蒼白也陶隱居言有兩種而後人往往貴白朮而賤蒼朮也為則曰華産兩種其利水也蒼勝於白故余取蒼朮也本邦所出其品下而功劣也銼用白頭翁主治熱利下重也考證白頭翁湯證曰熱利下重又曰下利欲飲水白頭翁加甘草阿膠湯證曰下利以上二方白頭翁皆三兩夫仲景用白頭翁者特治熱利而他無所見矣為則按若熱利渴而心悸則用白頭翁湯也加之血證及急迫之證則可用加甘草阿膠湯也品考白頭翁和漢無別
